<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Keeper Cooking Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-left">
        <button class="search-toggle-btn" onclick="toggleMobileSearch()">🔍</button>
        <h3 id="appTitle">Core Keeper Cook</h3>
    </div>

    <div class="lang-wrapper">
        <button class="lang-globe-btn" onclick="toggleLangMenu()">🌐</button>
        <div id="langMenu" class="lang-dropdown">
            <button class="lang-item" id="btn_ko" onclick="selectLang('ko')">한국어</button>
            <button class="lang-item" id="btn_en" onclick="selectLang('en')">English</button>
            <button class="lang-item" id="btn_ja" onclick="selectLang('ja')">日本語</button>
        </div>
    </div>

    <div id="mobileSearchContainer" class="mobile-search-bar" style="display:none;">
        <input type="text" id="searchInputMobile" class="mobile-search-input" placeholder="Search..." oninput="render()">
        <button class="search-close-btn" onclick="toggleMobileSearch()">✕</button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="search-box">
            <input type="text" id="searchInputPC" class="search-input" oninput="render()">
        </div>
        
        <div class="pc-filters">
            <div class="filter-category">
                <button class="stat-filter-btn active" id="btn-all" onclick="setFilter('all', 'all')">
                    <span id="txt-show-all">All Ingredients</span>
                </button>
            </div>
            <div id="dynamicFilters"></div>
        </div>

        <footer>
            Core Keeper content and materials are trademarks and copyrights of Pugstorm. <br>
            This website is an unofficial fan-made tool and is not affiliated with Pugstorm.
        </footer>
    </aside>

    <main class="content">
        <div id="mobileCategoryFilters" class="mobile-category-bar"></div>

        <div class="content-toolbar">
            <div class="sort-container">
                <select id="sortSelect" class="sort-select" onchange="setSort(this.value)">
                    <option value="default">Sort: Default</option>
                    <option value="value">Sort: Value (High)</option>
                    <option value="location">Sort: Location</option>
                    <option value="category">Sort: Category</option>
                </select>
            </div>
        </div>

        <div class="ingredient-grid" id="ingredientGrid"></div>
    </main>

    <aside class="result-panel">
        <div id="skillToggleContainer" class="toggle-container" style="display:none;">
            <span id="skillToggleLabel">Master Chef OFF</span>
            <button id="btn_skill_toggle" class="toggle-btn" onclick="toggleSkillMode()">
                <div class="toggle-circle"></div>
            </button>
        </div>

        <div id="goldAlert" class="golden-notice"></div>
        <div id="singleItemNotice" class="single-notice" style="display:none;"></div>

        <div class="cooking-pot">
            <div class="slot-wrapper">
                <div class="pot-slot" id="slot0" onclick="removeFromPot(0)" title="remove">?</div>
                <div class="slot-name" id="name0"></div>
            </div>
            <div class="slot-wrapper">
                <div class="pot-slot" id="slot1" onclick="removeFromPot(1)" title="remove">?</div>
                <div class="slot-name" id="name1"></div>
            </div>
        </div>
        <div class="result-stats" id="resultStats"></div>
        <div id="foodDisclaimer" class="disclaimer-text"></div>
        <button class="reset-btn" id="btn_reset" onclick="clearPotOnly()"></button>
    </aside>
</div>

<div id="filterModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Category</h3>
            <button class="close-modal" onclick="closeModal(null)">✕</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
